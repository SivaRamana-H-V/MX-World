<!DOCTYPE html>
<html>
<head>

    If you are serving your web app in a path other than the root, change the

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MX World — Global leader in freight forwarding and supply chain management. End-to-end logistics solutions including sea freight, air freight, road transport, rail logistics, 4PL integration and customs clearance across 100+ countries.">
  <meta name="keywords" content="freight forwarding, logistics, supply chain management, sea freight, air freight, cargo, 4PL logistics, customs clearance, warehousing, Coimbatore, global shipping">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://mxworld.in/">

  <!-- Open Graph -->
  <meta property="og:title" content="MX WORLD GLOBAL LOGISTICS">
  <meta property="og:description" content="Global leader in freight forwarding and supply chain management. Engineering the future of trade through data-driven precision across 100+ countries.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://mxworld.in/">
  <meta property="og:image" content="https://mxworld.in/icons/web-app-manifest-512x512.png">
  <meta property="og:image:width" content="512">
  <meta property="og:image:height" content="512">
  <meta property="og:site_name" content="MX World Global Logistics">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="MX WORLD GLOBAL LOGISTICS">
  <meta name="twitter:description" content="Global leader in freight forwarding and supply chain management. End-to-end logistics solutions across 100+ countries.">
  <meta name="twitter:image" content="https://mxworld.in/icons/web-app-manifest-512x512.png">

  <!-- Favicon (generated via favicon.io) -->
  <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="shortcut icon" href="favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="MX World" />

  <!-- iOS meta tags -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">

  <title>MX WORLD GLOBAL LOGISTICS — Freight Forwarding & Supply Chain Management</title>
  <link rel="manifest" href="icons/site.webmanifest">
</head>

    You can customize the "flutter_bootstrap.js" script.
